version: 2

builds:
  - main: ./cmd/clog
    binary: clog
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/made-purple/clog/internal/command.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "clog_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: made-purple
    name: clog
